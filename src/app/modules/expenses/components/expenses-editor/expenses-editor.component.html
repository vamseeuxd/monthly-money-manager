<ion-header>

  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="$event.stopPropagation();data.done=!data.done">
        <ion-icon *ngIf="!data.done" style="font-size: 30px;" name="radio-button-off"></ion-icon>
        <ion-icon *ngIf="data.done" style="font-size: 30px;" name="checkmark-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-input type="text" [(ngModel)]="data.name"></ion-input>
    <ion-buttons slot="end">
      <ion-button (click)="$event.stopPropagation();data.isImportant=!data.isImportant">
        <ion-icon [name]=" data.isImportant ? 'star' : 'star-outline' " slot="end"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

</ion-header>

<ion-content>

  <ion-item>
    <ion-label>Amount</ion-label>
    <ion-input [(ngModel)]="data.amount" style="text-align: right;" type="number"></ion-input>
    <ion-icon slot="start" name="logo-usd"></ion-icon>
  </ion-item>

  <ion-item>
    <ion-label>Due Date</ion-label>
    <ion-input [(ngModel)]="data.dueDate" style="text-align: right;" type="date"></ion-input>
    <ion-icon slot="start" name="calendar"></ion-icon>
  </ion-item>

  <ion-item>
    <ion-label>Repeat</ion-label>
    <ion-select placeholder="Select One" [(ngModel)]="data.repeat">
      <ion-select-option value="neverRepeat">Never repeat</ion-select-option>
      <ion-select-option value="repeatEveryDay">Every day</ion-select-option>
      <ion-select-option value="repeatEveryWeek">Every week</ion-select-option>
      <ion-select-option value="repeatEveryMonth">Every month</ion-select-option>
      <ion-select-option value="repeatEveryYear">Every year</ion-select-option>
      <ion-select-option value="custom">Custom...</ion-select-option>
    </ion-select>
    <ion-icon slot="start" name="git-compare"></ion-icon>
  </ion-item>

  <ion-item *ngIf="data.repeat!='neverRepeat'">
    <ion-label>No of Times to Repeat</ion-label>
    <ion-input [(ngModel)]="data.noOfrepeat" style="text-align: right;" type="number"></ion-input>
    <ion-icon slot="start" name="timer"></ion-icon>
  </ion-item>

  <ion-item>
    <ion-label>Expenses Type</ion-label>
    <ion-select placeholder="Select One" [(ngModel)]="data.type">
      <ion-select-option value="loan">Loan</ion-select-option>
      <ion-select-option value="creditCard">Credit Card</ion-select-option>
    </ion-select>
    <ion-icon slot="start" name="keypad"></ion-icon>
  </ion-item>

  <ion-item>
    <ion-label>Expenses Subtype</ion-label>
    <ion-select placeholder="Select One" [(ngModel)]="data.subType">
      <ion-select-option value="homeLoan">Home Loan</ion-select-option>
      <ion-select-option value="personalLoan">Personal Loan</ion-select-option>
      <ion-select-option value="carLoan">Car Loan</ion-select-option>
    </ion-select>
    <ion-icon slot="start" name="information-circle"></ion-icon>
  </ion-item>

  <ion-grid class="ion-margin-top">
    <ion-row>
      <ion-col>
        <ion-button (click)="cancelClickHandler()" expand="full" color="dark">Cancel</ion-button>
      </ion-col>
      <ion-col>
        <ion-button (click)="deleteClickHandler()" expand="full" color="danger">Delete</ion-button>
      </ion-col>
      <ion-col>
        <ion-button (click)="saveClickHandler()" expand="full" color="primary">Save</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>

<ion-footer>

</ion-footer>
